<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Login - Tennis Trainer Tool</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #27ae60; margin: 0; }
        .login-box { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); text-align: center; width: 300px; }
        h2 { color: #2c3e50; margin-bottom: 20px; }
        input { padding: 12px; width: 80%; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 5px; font-size: 16px; }
        button { padding: 12px 25px; background: #2c3e50; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 90%; }
        button:hover { background: #1a252f; }
        #error { color: #e74c3c; font-size: 0.9em; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Trainer Login</h2>
        <input type="password" id="pwField" placeholder="Passwort" onkeypress="if(event.key === 'Enter') checkPW()">
        <button onclick="checkPW()">Einloggen</button>
        <p id="error">Falsches Passwort!</p>
    </div>

    <script>
        function checkPW() {
            const pw = document.getElementById("pwField").value;
            // Hier dein Passwort festlegen:
            if (pw === "TennisSG2026") {
                sessionStorage.setItem("auth", "true");
                window.location.href = "start.html";
            } else {
                document.getElementById("error").style.display = "block";
            }
        }
    </script>
</body>
</html>
